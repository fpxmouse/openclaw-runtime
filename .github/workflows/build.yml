name: Build image

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: OpenClaw base image
        required: false
        default: ghcr.io/openclaw/openclaw:latest
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openclaw-runtime
  DEFAULT_BASE_IMAGE: ghcr.io/openclaw/openclaw:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build local image for self-check
        run: |
          docker build \
            --build-arg OPENCLAW_BASE_IMAGE="${{ inputs.base_image || env.DEFAULT_BASE_IMAGE }}" \
            -t openclaw-runtime:self-check .

      - name: Self-check runtime tools
        run: |
          docker run --rm \
            --entrypoint /opt/openclaw-runtime/scripts/doctor.sh \
            openclaw-runtime:self-check --quiet

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_BASE_IMAGE=${{ inputs.base_image || env.DEFAULT_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
